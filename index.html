<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DailyWear – Outfit & Wetter</title>
    <!-- Stildefinitionen -->
    <link rel="stylesheet" href="style.css" />
    <!-- Chart.js für die Mini‑Diagramme -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Haupt‑Javascript -->
    <script defer src="main.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">DailyWear</p>
        <h1>Heute in Gießen &amp; Frankfurt</h1>
        <p class="hero-copy">
          Tagesverlauf der Temperatur, Regenwahrscheinlichkeit und klare Outfit‑Empfehlungen – ganz ohne Eingabe.
        </p>
        <!-- Aktuelle Uhrzeit wird durch das Skript gesetzt -->
        <p id="current-time" class="current-time"></p>
      </header>
      <section class="cards" id="cards"></section>
    </main>
  </body>
</html>
